name = "arenaix-engine"
main = "battle-engine.js"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "arenaix-db"
database_id = "REPLACE_WITH_YOUR_D1_ID"

# Run battles every 2 minutes
[[triggers]]
crons = ["*/2 * * * *"]

[vars]
SITE_URL = "https://arenaix.kryv.network"
